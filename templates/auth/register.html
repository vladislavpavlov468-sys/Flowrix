{% extends "base.html" %}

{% block title %}Регистрация — Flowrix Market{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center"
     style="min-height: calc(100vh - 56px - 60px); background-color: var(--color-surface);">

  <div style="width: 100%; max-width: 480px;
              background: var(--color-bg);
              border: 1px solid var(--color-border);
              padding: 2.5rem;">

    <h1 style="font-size: 24px; font-weight: 500; margin-bottom: 0.25rem;">
      Создать аккаунт
    </h1>
    <p style="font-size: 14px; color: var(--color-muted); margin-bottom: 2rem;">
      Заполните данные для регистрации
    </p>

    <form method="POST" action="" novalidate id="register-form">

      <div style="margin-bottom: 1rem;">
        <label for="username"
               style="font-size: 12px; font-weight: 600;
                      letter-spacing: 0.05em; text-transform: uppercase;
                      display: block; margin-bottom: 0.5rem;">
          Имя пользователя
        </label>
        <input type="text"
               id="username"
               name="username"
               class="input-fx"
               placeholder="например, ivan_petrov"
               value="{{ username or '' }}"
               autocomplete="username"
               required
               minlength="3">
      </div>

      <div style="margin-bottom: 1rem;">
        <label for="email"
               style="font-size: 12px; font-weight: 600;
                      letter-spacing: 0.05em; text-transform: uppercase;
                      display: block; margin-bottom: 0.5rem;">
          Email
        </label>
        <input type="email"
               id="email"
               name="email"
               class="input-fx"
               placeholder="ivan@example.com"
               value="{{ email or '' }}"
               autocomplete="email"
               required>
      </div>

      <div style="margin-bottom: 1.25rem;">
        <label for="password"
               style="font-size: 12px; font-weight: 600;
                      letter-spacing: 0.05em; text-transform: uppercase;
                      display: block; margin-bottom: 0.5rem;">
          Пароль
        </label>
        <div class="position-relative">
          <input type="password"
                 id="password"
                 name="password"
                 class="input-fx"
                 placeholder="Мин. 8 символов (буквы, цифры, знаки)"
                 autocomplete="new-password"
                 required
                 minlength="8"
                 pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$"
                 title="Пароль должен содержать минимум 8 символов, включая буквы, цифры и специальные знаки (@$!%*#?&)">
          <button type="button" 
                  onclick="togglePassword('password', this)"
                  class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-dark p-3"
                  style="box-shadow: none; text-decoration: none;">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <div style="margin-bottom: 1.75rem;">
        <label for="confirm_password"
               style="font-size: 12px; font-weight: 600;
                      letter-spacing: 0.05em; text-transform: uppercase;
                      display: block; margin-bottom: 0.5rem;">
          Повторите пароль
        </label>
        <div class="position-relative">
          <input type="password"
                 id="confirm_password"
                 name="confirm_password"
                 class="input-fx"
                 placeholder="Введите пароль ещё раз"
                 autocomplete="new-password"
                 required>
          <button type="button" 
                  onclick="togglePassword('confirm_password', this)"
                  class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-dark p-3"
                  style="box-shadow: none; text-decoration: none;">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <script>
        function togglePassword(id, btn) {
          const input = document.getElementById(id);
          const icon = btn.querySelector('i');
          if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
          } else {
            input.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
          }
        }
      </script>


      <button type="submit" class="btn-primary-fx w-100" id="btn-register">
        Зарегистрироваться
      </button>

    </form>

    <p style="font-size: 14px; color: var(--color-muted);
              margin-top: 1.5rem; text-align: center;">
      Уже есть аккаунт?
      <a href="{{ url_for('auth.login') }}"
         style="color: var(--color-text); font-weight: 500;">
        Войти
      </a>
    </p>

  </div>
</div>
{% endblock %}
