{% extends "base.html" %}

{% block title %}Вход — Flowrix Market{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center"
     style="min-height: calc(100vh - 56px - 60px); background-color: var(--color-surface);">

  <div style="width: 100%; max-width: 420px;
              background: var(--color-bg);
              border: 1px solid var(--color-border);
              padding: 2.5rem;">

    <h1 style="font-size: 24px; font-weight: 500; margin-bottom: 0.25rem;">
      Вход в систему
    </h1>
    <p style="font-size: 14px; color: var(--color-muted); margin-bottom: 2rem;">
      Введите ваш email и пароль
    </p>

    <form method="POST" action="" novalidate id="login-form">

      <div style="margin-bottom: 1rem;">
        <label for="email"
               style="font-size: 12px; font-weight: 600;
                      letter-spacing: 0.05em; text-transform: uppercase;
                      display: block; margin-bottom: 0.5rem;">
          Email
        </label>
        <input type="email"
               id="email"
               name="email"
               class="input-fx"
               placeholder="ivan@example.com"
               value="{{ email or '' }}"
               autocomplete="email"
               required>
      </div>

      <div style="margin-bottom: 1rem;">
        <label for="password"
               style="font-size: 12px; font-weight: 600;
                      letter-spacing: 0.05em; text-transform: uppercase;
                      display: block; margin-bottom: 0.5rem;">
          Пароль
        </label>
        <input type="password"
               id="password"
               name="password"
               class="input-fx"
               placeholder="Ваш пароль"
               autocomplete="current-password"
               required>
      </div>

      <div style="margin-bottom: 1.75rem; display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox"
               id="remember"
               name="remember"
               style="width: 16px; height: 16px; accent-color: var(--color-primary); cursor: pointer;">
        <label for="remember" style="font-size: 14px; cursor: pointer;">
          Запомнить меня
        </label>
      </div>

      <button type="submit" class="btn-primary-fx w-100" id="btn-login">
        Войти
      </button>

    </form>

    <p style="font-size: 14px; color: var(--color-muted);
              margin-top: 1.5rem; text-align: center;">
      Нет аккаунта?
      <a href="{{ url_for('auth.register') }}"
         style="color: var(--color-text); font-weight: 500;">
        Зарегистрироваться
      </a>
    </p>

  </div>
</div>
{% endblock %}
