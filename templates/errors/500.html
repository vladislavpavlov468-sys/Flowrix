{% extends "base.html" %}
{% block title %}500 — Ошибка сервера{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center"
     style="min-height: calc(100vh - 56px - 60px); padding: 2rem;">
  <p style="font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--color-muted); margin-bottom: 0.5rem;">500</p>
  <h1 style="font-size: 48px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 1rem;">
    Ошибка сервера
  </h1>
  <p style="font-size: 16px; color: var(--color-muted); margin-bottom: 2rem;">
    Что-то пошло не так. Мы уже разбираемся в проблеме.
  </p>
  <a href="{{ url_for('products.index') }}" class="btn-primary-fx">На главную</a>
</div>
{% endblock %}
